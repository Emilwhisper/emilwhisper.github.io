<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menu</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #262624;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
  }
  h1 {
    margin-bottom: 20px;
    color: #FAFAF7;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    max-width: 400px;
    width: 100%;
  }
  a.button {
    display: block;
    text-align: center;
    padding: 20px;
    background: #30302E;
    color: #FAFAF7;
    text-decoration: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    border: 1px solid #3D3D3A;
    transition: background 0.2s, border-color 0.2s;
  }
  a.button:hover {
    background: #3D3D3A;
    border-color: #D8916F;
  }
  a.special {
    grid-column: 1 / -1;
    background: #D8916F;
    color: #262624;
    border: 1px solid #D8916F;
  }
  a.special:hover {
    background: #E5A583;
    border-color: #E5A583;
  }
</style>
</head>
<body>

<h1>Mega Pampi Menu</h1>

<div class="grid">
  <a class="button" href="A/index.html">A</a>
  <a class="button" href="B/index.html">B</a>
  <a class="button" href="D/index.html">B2</a>
  <a class="button" href="C/index.html">C</a>
  <a class="button" href="F/index.html">F</a>
  <a class="button" href="G/index.html">F2</a>
  <a class="button" href="G/index2.html">F2a</a>
  <a class="button" href="G/index3.html">F3</a>
  <a class="button" href="H/index.html">G</a>
  <a class="button" href="I/index.html">H</a>
  <a class="button special" href="SPECIAL/index.html">SPECIAL</a>
</div>

</body>
</html>
