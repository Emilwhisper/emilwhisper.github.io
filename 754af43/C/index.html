<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Daniel Catches the Car</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0b0e13; font-family: system-ui, Segoe UI, Roboto, sans-serif; color: #fff; }
  #game { position: fixed; inset: 0; }
  #game canvas { display: block; }

  /* HUD */
  #hud { position: fixed; top: 12px; left: 12px; right: 12px; pointer-events: none; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; z-index: 5; }
  .bars { display: flex; flex-direction: column; gap: 6px; }
  .bar { display: flex; align-items: center; gap: 8px; }
  .bar > span { width: 52px; font-size: 12px; font-weight: 700; letter-spacing: .5px; text-shadow: 0 1px 2px #000; }
  .track { width: 220px; height: 16px; background: rgba(0,0,0,.55); border: 2px solid rgba(255,255,255,.25); border-radius: 9px; overflow: hidden; }
  .fill { height: 100%; width: 100%; transition: width .12s linear; }
  .food { background: linear-gradient(90deg,#ff8a3d,#ffd166); }
  .water { background: linear-gradient(90deg,#2a9df4,#7fd3ff); }
  .gas { background: linear-gradient(90deg,#27ae60,#9be15d); }
  #stats { text-align: right; font-size: 13px; line-height: 1.5; background: rgba(0,0,0,.5); padding: 8px 12px; border-radius: 10px; text-shadow: 0 1px 2px #000; }
  #stats b { color: #ffd166; }

  /* Prompt */
  #prompt { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.65); border: 2px solid #ffd166; padding: 10px 18px; border-radius: 12px; font-size: 16px; font-weight: 700; z-index: 6; display: none; pointer-events: none; }
  #prompt b { color: #ffd166; }

  /* Messages */
  #messages { position: fixed; inset: 0; pointer-events: none; z-index: 7; }
  .msg { position: absolute; left: 50%; top: 38%; transform: translateX(-50%); font-size: 24px; font-weight: 800; text-shadow: 0 2px 6px #000; animation: floatUp 1.4s ease-out forwards; }
  @keyframes floatUp { from { opacity: 1; transform: translate(-50%,0); } to { opacity: 0; transform: translate(-50%,-46px); } }

  /* Help */
  #help { position: fixed; bottom: 10px; left: 12px; font-size: 12px; color: #cfd6e0; background: rgba(0,0,0,.45); padding: 6px 10px; border-radius: 8px; z-index: 5; pointer-events: none; }

  /* Modals */
  .modal { position: fixed; inset: 0; background: rgba(5,8,14,.78); display: flex; align-items: center; justify-content: center; z-index: 20; }
  .modal.hidden { display: none; }
  .card { background: #141a24; border: 2px solid #2c3a4e; border-radius: 16px; padding: 26px 30px; width: min(520px, 92vw); max-height: 88vh; overflow: auto; box-shadow: 0 20px 60px rgba(0,0,0,.6); }
  .card h1 { margin: 0 0 12px; font-size: 30px; color: #ffd166; }
  .card h2 { margin: 4px 0 14px; font-size: 24px; }
  .card h3 { margin: 18px 0 8px; font-size: 18px; color: #9be15d; }
  .card p { margin: 6px 0; font-size: 16px; line-height: 1.5; color: #d6dce5; }
  .card p.cur { color: #fff; }
  .card p.hint { color: #7fd3ff; font-style: italic; font-size: 14px; }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 0; border-bottom: 1px solid #232d3a; font-size: 15px; }
  button { font: inherit; cursor: pointer; background: #ffd166; color: #1a1a1a; border: none; padding: 11px 16px; border-radius: 10px; font-weight: 800; margin: 6px 6px 0 0; }
  button:hover { filter: brightness(1.07); }
  button:disabled { background: #3a4658; color: #7c8794; cursor: not-allowed; }
  button.ghost { background: #2c3a4e; color: #fff; }
  .big { font-size: 20px; padding: 14px 22px; margin-top: 16px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
  .stats-grid div { background: #1b2330; padding: 12px; border-radius: 10px; text-align: center; }
  .stats-grid b { display: block; font-size: 26px; color: #ffd166; }
  .stats-grid span { font-size: 12px; color: #9fb0c3; }
  .gameover h1 { color: #ff5d5d; }
</style>
</head>
<body>
<div id="game"></div>

<div id="hud">
  <div class="bars">
    <div class="bar"><span>FOOD</span><div class="track"><div id="foodFill" class="fill food"></div></div></div>
    <div class="bar"><span>WATER</span><div class="track"><div id="waterFill" class="fill water"></div></div></div>
    <div class="bar"><span>GAS</span><div class="track"><div id="gasFill" class="fill gas"></div></div></div>
  </div>
  <div id="stats"></div>
</div>

<div id="prompt"></div>
<div id="messages"></div>
<div id="help">W/↑ accelerate · S/↓ brake · A/← D/→ steer · E interact (hook wreck / enter shop) · Esc close · M mute</div>

<div id="intro" class="modal">
  <div class="card">
    <h1>🚚 Daniel Catches the Car</h1>
    <div id="story"></div>
    <button id="startBtn" class="big" style="display:none">▶ Start the Shift</button>
  </div>
</div>

<div id="shop" class="modal hidden"></div>

<div id="gameover" class="modal hidden gameover">
  <div class="card">
    <h1>WTF Daniel.</h1>
    <p id="goReason">You ran out of something important.</p>
    <div class="stats-grid" id="goStats"></div>
    <button id="againBtn" class="big">↻ Try Again</button>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

/* ============================== CONSTANTS ============================== */
const TARGET_TRAFFIC = 9;
const ATTACH_MAX = 3;
const HIT_R = 3.6;
const ATTACH_SPACING = 9.5;
const ROAD_HALF = 12;          // drivable half-width
const POI_X = 20;              // POI distance from road center

const PR = { gas:28, dinerFood:18, dinerWater:10, barWater:14, barFood:12, panicFood:38, panicWater:34 };
const gasCost   = [200, 380, 600];
const turboCost = [240, 480, 850];
const armorCost = [300, 600, 1000];
const freezerCost = 500;
const towCost   = [350, 700, 1200];
const nosCost   = [300, 600, 1000];
const ecoCost   = [250, 500, 800];
const plowCost  = [300, 650, 1100];
const fraudCost = [400, 800, 1400];

const CAR_TYPES = {
  beater: { name:'Beater', w:2.2, h:1.5, l:4.2, color:0x8a8a8a, speed:14, health:28, value:80  },
  sedan:  { name:'Sedan',  w:2.4, h:1.6, l:4.6, color:0x2a6fb0, speed:20, health:48, value:150 },
  suv:    { name:'SUV',    w:2.6, h:1.9, l:4.8, color:0x3a7d44, speed:18, health:80, value:220 },
  pickup: { name:'Pickup', w:2.5, h:1.7, l:5.0, color:0x7a4a23, speed:19, health:70, value:250 },
  sports: { name:'Sports', w:2.2, h:1.4, l:4.4, color:0xd8352a, speed:34, health:55, value:420 },
  luxury: { name:'Luxury', w:2.6, h:1.7, l:5.2, color:0x14181f, speed:24, health:95, value:620 },
  exotic:    { name:'Exotic',    w:2.2, h:1.3, l:4.6, color:0x00e5ff, speed:42, health:60,  value:900 },
  limo:      { name:'Limo',      w:2.8, h:1.8, l:7.6, color:0x10131a, speed:22, health:140, value:700 },
  foodtruck: { name:'FoodTruck', w:2.8, h:2.4, l:5.6, color:0xff8c3b, speed:16, health:110, value:350 },
  police:    { name:'Police',    w:2.5, h:1.7, l:5.0, color:0x1a3a8a, speed:30, health:95,  value:500 },
  motorcycle:{ name:'Moto',      w:0.9, h:1.3, l:2.6, color:0xff2d6b, speed:32, health:18,  value:200 },
  bus:       { name:'Bus',       w:3.0, h:2.6, l:9.0, color:0xf2c200, speed:14, health:180, value:600 },
};
const CAR_WEIGHTS = [['beater',25],['sedan',25],['suv',15],['pickup',15],['sports',12],['luxury',8],['exotic',4],['limo',4],['foodtruck',8],['police',6],['motorcycle',10],['bus',4]];
const POI_WEIGHTS = [['diner',30],['bar',25],['gas',25],['garage',20]];

/* ============================== STATE ============================== */
const state = {
  mode:'intro', paused:false,
  heading:0, speed:0, pos:new THREE.Vector3(0,0,0),
  food:85, water:85, gas:100, money:60,
  gasStage:0, turboStage:0, armorStage:0, freezer:false,
  nosStage:0, ecoStage:0, plowStage:0, fraudStage:0, towStage:0, nos:100,
  attached:[], traffic:[], pois:[],
  nextPOIZ:-300, frontierZ:0,
  repoCount:0, totalEarned:0, dist:0,
  near:null, muted:false, shopPOI:null,
};

/* ============================== THREE SETUP ============================== */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xbcd3e0);
scene.fog = new THREE.Fog(0xbcd3e0, 70, 620);

const camera = new THREE.PerspectiveCamera(62, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 8, 14);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(2, devicePixelRatio));
renderer.setSize(innerWidth, innerHeight);
document.getElementById('game').appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x4a5a3a, 0.85));
const sun = new THREE.DirectionalLight(0xfff2d6, 0.9);
sun.position.set(40, 80, 30);
scene.add(sun);

/* Ground */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40000, 40000),
  new THREE.MeshLambertMaterial({ color:0x4f7a3a })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.02;
scene.add(ground);

/* Road */
function makeRoadTexture(){
  const c = document.createElement('canvas'); c.width=64; c.height=256;
  const x = c.getContext('2d');
  x.fillStyle = '#2b2f36'; x.fillRect(0,0,64,256);
  x.fillStyle = '#e9e9e9'; x.fillRect(3,0,3,256); x.fillRect(58,0,3,256); // edges
  x.fillStyle = '#f4c020';
  for(let i=0;i<256;i+=46){ x.fillRect(29, i, 6, 26); } // center dashes
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(1, 40);
  return t;
}
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(ROAD_HALF*2, 1200),
  new THREE.MeshLambertMaterial({ map: makeRoadTexture() })
);
road.rotation.x = -Math.PI/2;
road.position.y = 0.0;
scene.add(road);

/* Guard rails */
const railMat = new THREE.MeshLambertMaterial({ color:0x9aa3ad });
const railGeo = new THREE.BoxGeometry(0.4, 1.0, 1200);
const railL = new THREE.Mesh(railGeo, railMat); railL.position.set(-(ROAD_HALF+0.6), 0.5, 0); scene.add(railL);
const railR = new THREE.Mesh(railGeo, railMat); railR.position.set((ROAD_HALF+0.6), 0.5, 0); scene.add(railR);

/* Distant hills */
for(let i=0;i<10;i++){
  const h = new THREE.Mesh(new THREE.ConeGeometry(60+Math.random()*40, 60+Math.random()*60, 5),
    new THREE.MeshLambertMaterial({ color:0x6f8a5a }));
  const side = i%2? 1 : -1;
  h.position.set(side*(120+Math.random()*120), h.geometry.parameters.height/2-4, -i*200 - 100);
  scene.add(h);
}

/* ============================== MODELS ============================== */
// Must match Three.js rotation.y convention: rotating (0,0,-1) by yaw about +Y
function forwardVec(yaw){ return new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw)); }

function makeWheels(group, wx, wz, r){
  const wg = new THREE.CylinderGeometry(r, r, 0.5, 14);
  wg.rotateZ(Math.PI/2);
  const wm = new THREE.MeshLambertMaterial({ color:0x111111 });
  const wheels = [];
  for(const sx of [-1,1]) for(const sz of wz){
    const w = new THREE.Mesh(wg, wm);
    w.position.set(sx*wx, r, sz);
    group.add(w); wheels.push(w);
  }
  return wheels;
}

function makeTruck(){
  const g = new THREE.Group();
  const yellow = new THREE.MeshLambertMaterial({ color:0xf2c200 });
  const dark = new THREE.MeshLambertMaterial({ color:0x222222 });

  const cab = new THREE.Mesh(new THREE.BoxGeometry(3.2, 1.7, 2.2), yellow);
  cab.position.set(0, 1.5, -1.4); g.add(cab);
  const hood = new THREE.Mesh(new THREE.BoxGeometry(3.0, 1.0, 1.8), yellow);
  hood.position.set(0, 1.0, -3.0); g.add(hood);
  const wind = new THREE.Mesh(new THREE.BoxGeometry(2.9, 0.9, 0.2), new THREE.MeshLambertMaterial({color:0x88c0ff}));
  wind.position.set(0, 1.7, -2.45); g.add(wind);

  const bedBase = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.5, 4.6), yellow);
  bedBase.position.set(0, 1.0, 1.6); g.add(bedBase);
  for(const sx of [-1,1]){
    const rail = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.9, 4.6), yellow);
    rail.position.set(sx*1.55, 1.6, 1.6); g.add(rail);
  }
  const winch = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 0.6), dark);
  winch.position.set(0, 1.1, 4.0); g.add(winch);

  makeWheels(g, 1.6, [-2.2, 1.0], 0.75);

  // headlights
  for(const sx of [-1,1]){
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.4,0.2), new THREE.MeshBasicMaterial({color:0xffffcc}));
    hl.position.set(sx*1.0, 1.1, -3.85); g.add(hl);
  }

  // front plow (hidden until upgraded)
  const plow = new THREE.Group();
  const pblade = new THREE.Mesh(new THREE.BoxGeometry(3.6, 1.3, 0.6), new THREE.MeshLambertMaterial({color:0x555a61}));
  pblade.position.set(0, 0.7, -0.3); pblade.rotation.x = -0.35;
  const pframe = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 1.6), new THREE.MeshLambertMaterial({color:0x333333}));
  pframe.position.set(0, 0.7, 0.4);
  plow.add(pblade); plow.add(pframe);
  plow.position.set(0, 0, -4.2);
  plow.visible = false;
  g.add(plow);
  g.userData.plow = plow;

  return g;
}

function makeCarMesh(cfg){
  const g = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({ color: cfg.color });
  const body = new THREE.Mesh(new THREE.BoxGeometry(cfg.w, cfg.h*0.55, cfg.l), mat);
  body.position.y = cfg.h*0.5; g.add(body);
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(cfg.w*0.82, cfg.h*0.5, cfg.l*0.5), mat);
  cabin.position.set(0, cfg.h*0.5 + cfg.h*0.25, -cfg.l*0.04); g.add(cabin);
  const glass = new THREE.Mesh(new THREE.BoxGeometry(cfg.w*0.84, cfg.h*0.42, cfg.l*0.4),
    new THREE.MeshLambertMaterial({ color:0x88c0ff }));
  glass.position.set(0, cfg.h*0.5 + cfg.h*0.27, -cfg.l*0.04); g.add(glass);
  makeWheels(g, cfg.w*0.55, [-cfg.l*0.32, cfg.l*0.32], 0.6);
  g.userData.mat = mat;
  return g;
}

function makeTextTexture(text, bg, fg){
  const c = document.createElement('canvas'); c.width=256; c.height=64;
  const x = c.getContext('2d');
  x.fillStyle = bg; x.fillRect(0,0,256,64);
  x.fillStyle = fg; x.font='bold 40px system-ui, sans-serif';
  x.textAlign='center'; x.textBaseline='middle'; x.fillText(text, 128, 34);
  return new THREE.CanvasTexture(c);
}

const POI_STYLE = {
  diner:  { color:0xffcc55, sign:'DINER',  bg:'#ffcc55', fg:'#3a2a00' },
  bar:    { color:0xaa3366, sign:'BAR',    bg:'#aa3366', fg:'#ffffff' },
  garage: { color:0x4477aa, sign:'GARAGE', bg:'#4477aa', fg:'#ffffff' },
  gas:    { color:0xdd4422, sign:'GAS',    bg:'#dd4422', fg:'#ffffff' },
};

function makePOI(type){
  const g = new THREE.Group();
  const st = POI_STYLE[type];
  const building = new THREE.Mesh(new THREE.BoxGeometry(16, 9, 13),
    new THREE.MeshLambertMaterial({ color: st.color }));
  building.position.y = 4.5; g.add(building);
  const roof = new THREE.Mesh(new THREE.BoxGeometry(17, 1, 14),
    new THREE.MeshLambertMaterial({ color:0x2c333d }));
  roof.position.y = 9.3; g.add(roof);

  if(type==='gas'){
    for(const sx of [-4,4]){
      const pump = new THREE.Mesh(new THREE.BoxGeometry(1.4,3,1.4), new THREE.MeshLambertMaterial({color:0xdddddd}));
      pump.position.set(sx, 1.5, 9); g.add(pump);
    }
  }
  if(type==='garage'){
    const door = new THREE.Mesh(new THREE.BoxGeometry(9,6,0.4), new THREE.MeshLambertMaterial({color:0x9aa3ad}));
    door.position.set(0,3,6.6); g.add(door);
  }

  const signTex = makeTextTexture(st.sign, st.bg, st.fg);
  const sign = new THREE.Mesh(new THREE.PlaneGeometry(15, 3.6),
    new THREE.MeshBasicMaterial({ map: signTex, transparent:true }));
  sign.position.set(0, 13, 0);
  g.add(sign);

  // little post so sign floats above
  const post = new THREE.Mesh(new THREE.BoxGeometry(0.4,12,0.4), new THREE.MeshLambertMaterial({color:0x333333}));
  post.position.set(0,6,-6); g.add(post);

  // tall bright beacon so the POI is visible from far away
  const beaconColors = { diner:0xffcc55, bar:0xaa3366, garage:0x55ccff, gas:0xff5533 };
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,18,8), new THREE.MeshBasicMaterial({color:0x222222}));
  pole.position.set(0, 9, -6); g.add(pole);
  const beacon = new THREE.Mesh(new THREE.SphereGeometry(1.2, 14, 14), new THREE.MeshBasicMaterial({color:beaconColors[type]}));
  beacon.position.set(0, 18, -6); g.add(beacon);

  return g;
}

/* ============================== SPAWNING ============================== */
function pickWeighted(list){
  let total = 0; for(const e of list) total += e[1];
  let r = Math.random()*total;
  for(const [k,w] of list){ if((r-=w) <= 0) return k; }
  return list[0][0];
}
function rand(a,b){ return a + Math.random()*(b-a); }

function spawnCar(z){
  const key = pickWeighted(CAR_WEIGHTS);
  const cfg = CAR_TYPES[key];
  const mesh = makeCarMesh(cfg);
  const lane = [-7, -3.5, 3.5, 7][Math.floor(Math.random()*4)];
  mesh.position.set(lane, 0, z);
  mesh.rotation.y = 0;
  scene.add(mesh);
  mesh.userData = { cfg, health: cfg.health, speed: cfg.speed*rand(0.9,1.1), lane, wrecked:false, attached:false, hitCd:0 };
  state.traffic.push(mesh);
}

function spawnPOI(z, forcedType){
  const type = forcedType || pickWeighted(POI_WEIGHTS);
  const side = Math.random()<0.5 ? -1 : 1;
  const g = makePOI(type);
  g.position.set(side*POI_X, 0, z);
  // orient building so its front faces the road
  g.rotation.y = side < 0 ? Math.PI/2 : -Math.PI/2;
  scene.add(g);
  state.pois.push({ group:g, type, side, x:side*POI_X, z });
}

/* ============================== GAME LOGIC ============================== */
function getMax(res){
  if(res==='gas') return 100 + state.gasStage*80;
  if(res==='food') return 100 + (state.freezer?60:0);
  if(res==='water') return 100 + (state.freezer?60:0);
}
function ramBase(){ return 1.1 + state.armorStage*0.7 + state.plowStage*0.6; }
function maxAttach(){ return ATTACH_MAX + state.towStage; }
function maxSpeedNow(){ return 38 + state.turboStage*13; }

function wreckCar(car){
  car.userData.wrecked = true;
  car.userData.speed = 0;
  car.userData.mat.color.set(0x3a3a3a);
  car.rotation.z = (Math.random()-0.5)*0.25;
  showMsg('TOTALED! Press E to hook', '#ff8844');
  crashSound();
}

function checkCollisions(){
  const tx = truck.position.x, tz = truck.position.z;
  for(const car of state.traffic){
    if(car.userData.wrecked || car.userData.attached) continue;
    if(car.userData.hitCd > 0){ car.userData.hitCd -= 1/60; continue; }
    const dx = car.position.x - tx, dz = car.position.z - tz;
    const d = Math.hypot(dx, dz);
    if(d < HIT_R){
      const impact = Math.abs(state.speed) - 6;
      if(impact > 0){
        const dmg = impact * ramBase();
        car.userData.health -= dmg;
        car.userData.hitCd = 0.35;
        const nx = dx/(d||1), nz = dz/(d||1);
        car.position.x += nx*2.2; car.position.z += nz*2.2;
        state.speed *= 0.86;
        if(car.userData.health <= 0){ wreckCar(car); }
        else { showMsg('-'+Math.round(dmg)+' dmg', '#ff8844'); crashSound(); }
        shake = 0.35;
      }
    }
  }
}

function attachCar(car){
  const i = state.traffic.indexOf(car);
  if(i>=0) state.traffic.splice(i,1);
  car.userData.attached = true;
  scene.attach(car); // keep world transform
  state.attached.push(car);
  showMsg('Hooked a '+car.userData.cfg.name+'!', '#FFAA00');
  blip(420, 0.1);
}

function updateAttached(dt){
  const fwd = forwardVec(state.heading);
  let anchor = truck.position.clone();
  const k = 1 - Math.exp(-dt*8);
  for(const c of state.attached){
    const target = anchor.clone().addScaledVector(fwd, -ATTACH_SPACING);
    c.position.lerp(target, k);
    c.rotation.set(0, state.heading, 0);
    anchor = c.position.clone();
  }
}

function updateTraffic(dt){
  const f = forwardVec(0);
  for(const car of state.traffic){
    if(car.userData.wrecked || car.userData.attached) continue;
    car.position.addScaledVector(f, car.userData.speed*dt);
    car.position.x += (car.userData.lane - car.position.x) * Math.min(1, dt*2);
  }
}

function maintainWorld(){
  // POIs ahead
  while(state.nextPOIZ > state.pos.z - 1600){ spawnPOI(state.nextPOIZ); state.nextPOIZ -= rand(250, 460); }
  for(let i=state.pois.length-1;i>=0;i--){
    if(state.pois[i].group.position.z > state.pos.z + 250){ scene.remove(state.pois[i].group); state.pois.splice(i,1); }
  }
  // traffic ahead
  while(state.frontierZ > state.pos.z - 850 && state.traffic.length < TARGET_TRAFFIC){
    state.frontierZ -= rand(70, 170);
    spawnCar(state.frontierZ);
  }
  for(let i=state.traffic.length-1;i>=0;i--){
    const c = state.traffic[i];
    if(c.userData.attached) continue;
    if(c.position.z > state.pos.z + 90 || c.position.z < state.pos.z - 950){
      scene.remove(c); state.traffic.splice(i,1);
    }
  }
}

function updateControls(dt){
  const k = keys;
  const throttle = (k['ArrowUp']||k['KeyW']) ? 1 : 0;
  const brake    = (k['ArrowDown']||k['KeyS']) ? 1 : 0;
  const left     = (k['ArrowLeft']||k['KeyA']) ? 1 : 0;
  const right    = (k['ArrowRight']||k['KeyD']) ? 1 : 0;
  const boosting = state.nosStage>0 && k['Space'] && state.nos>0;
  const boostMul = boosting ? (1 + 0.28*state.nosStage) : 1;
  const maxS = maxSpeedNow() * boostMul;
  const acc = (20 + state.turboStage*7) * (boosting ? (1 + 0.35*state.nosStage) : 1);
  if(throttle) state.speed += acc*dt;
  if(brake)    state.speed -= acc*1.2*dt;
  if(!throttle && !brake){ state.speed *= Math.pow(0.35, dt); if(Math.abs(state.speed)<0.3) state.speed=0; }
  state.speed = Math.max(-maxS*0.4, Math.min(maxS, state.speed));
  if(boosting) state.nos = Math.max(0, state.nos - 24*dt);
  else state.nos = Math.min(100, state.nos + 9*dt);
  // steering: smooth & speed-dependent, no turning at a standstill
  const speedFactor = Math.max(0, Math.min(1, (Math.abs(state.speed)-2)/6));
  const turn = 1.4 * speedFactor * Math.sign(state.speed || 1);
  if(left)  state.heading += turn*dt;   // nose swings to screen-left
  if(right) state.heading -= turn*dt;   // nose swings to screen-right
}

function updateTruck(dt){
  const fwd = forwardVec(state.heading);
  state.pos.addScaledVector(fwd, state.speed*dt);
  state.pos.x = Math.max(-30, Math.min(30, state.pos.x));
  truck.position.set(state.pos.x, 0, state.pos.z);
  truck.rotation.y = state.heading;
  // push out of POI buildings
  for(const p of state.pois){
    if(Math.abs(p.z - state.pos.z) < 9 && Math.abs(p.x - state.pos.x) < 10){
      const dir = state.pos.x < p.x ? -1 : 1;
      state.pos.x = p.x + dir*10;
      truck.position.x = state.pos.x;
    }
  }
}

function updateResources(dt){
  state.food  -= 0.8 * dt;
  state.water -= 1.0 * dt;
  if(Math.abs(state.speed) > 0.5) state.gas -= Math.abs(state.speed)*0.025*dt;
  if(state.freezer && state.attached.length>0){
    state.food  = Math.min(getMax('food'),  state.food  + 0.4*dt);
    state.water = Math.min(getMax('water'), state.water + 0.4*dt);
  }
  if(state.food<=0 || state.water<=0 || state.gas<=0){ gameOver(); }
}

let shake = 0;
function updateCamera(dt){
  const fwd = forwardVec(state.heading);
  const camPos = truck.position.clone().addScaledVector(fwd, -12).add(new THREE.Vector3(0, 7, 0));
  if(shake>0){ shake -= dt; camPos.x += (Math.random()-0.5)*shake*2; camPos.y += (Math.random()-0.5)*shake*2; }
  camera.position.lerp(camPos, 1 - Math.exp(-dt*10));
  const look = truck.position.clone().addScaledVector(fwd, 8).add(new THREE.Vector3(0, 2, 0));
  camera.lookAt(look);
  // keep road/rails centered on truck
  road.position.z = truck.position.z;
  railL.position.z = truck.position.z;
  railR.position.z = truck.position.z;
}

function updateNear(){
  state.near = null;
  let best = 1e9;
  for(const p of state.pois){
    const d = Math.hypot(p.x - truck.position.x, p.z - truck.position.z);
    if(d < 26 && d < best){ best = d; state.near = { type:'poi', poi:p }; }
  }
  if(state.attached.length < ATTACH_MAX){
    for(const car of state.traffic){
      if(!car.userData.wrecked || car.userData.attached) continue;
      const d = Math.hypot(car.position.x - truck.position.x, car.position.z - truck.position.z);
      if(d < 16 && d < best){ best = d; state.near = { type:'wreck', car }; }
    }
  }
  const el = document.getElementById('prompt');
  if(!state.near){ el.style.display='none'; return; }
  el.style.display='block';
  if(state.near.type==='wreck'){
    el.innerHTML = 'Press <b>E</b> — Hook the '+state.near.car.userData.cfg.name+' ('+state.attached.length+'/'+ATTACH_MAX+')';
  } else {
    const t = state.near.poi.type;
    const label = { diner:'Diner — food & drink', bar:'Bar — drinks & snacks', gas:'Gas Station — gas & panic supplies', garage:'Garage — sell cars & upgrades' }[t];
    el.innerHTML = 'Press <b>E</b> — '+label;
  }
}

/* ============================== SHOP / UI ============================== */
const shopEl = document.getElementById('shop');
function upgradeRow(name, stage, max, cost, key){
  if(stage >= max) return `<div class="row"><span>${name}</span><b>MAX</b></div>`;
  const can = state.money >= cost;
  return `<div class="row"><span>${name} (Lv ${stage+1})</span><button data-act="up-${key}" ${can?'':'disabled'}>$${cost}</button></div>`;
}
function freezerRow(){
  if(state.freezer) return `<div class="row"><span>Mini Freezer</span><b>OWNED</b></div>`;
  const can = state.money >= freezerCost;
  return `<div class="row"><span>Mini Freezer (car-fridge inventory)</span><button data-act="up-freezer" ${can?'':'disabled'}>$${freezerCost}</button></div>`;
}
function shopHTML(poi){
  const s = state;
  if(poi.type==='garage'){
    let sum=0; s.attached.forEach(c=> sum += c.userData.cfg.value);
    let h = `<h2>🔧 Garage</h2>
      <div class="row"><span>Towed cars</span><b>${s.attached.length}/${ATTACH_MAX}</b></div>
      <div class="row"><span>Worth</span><b>$${sum}</b></div>
      <button data-act="sell" ${s.attached.length?'':'disabled'}>Sell Towed Cars (+$${sum})</button>
      <h3>Upgrades</h3>
      ${upgradeRow('Gas Tank', s.gasStage, 3, gasCost[s.gasStage], 'gas')}
      ${upgradeRow('Turbo', s.turboStage, 3, turboCost[s.turboStage], 'turbo')}
      ${upgradeRow('Armor', s.armorStage, 3, armorCost[s.armorStage], 'armor')}
      ${freezerRow()}
      <button class="ghost" data-act="close">Leave</button>`;
    return h;
  }
  if(poi.type==='gas'){
    return `<h2>⛽ Gas Station</h2>
      <p style="color:#ffb3a0">Panic prices — but it's open.</p>
      <button data-act="gas">+45 Gas ($${PR.gas})</button>
      <button data-act="food">+55 Food ($${PR.panicFood})</button>
      <button data-act="water">+50 Water ($${PR.panicWater})</button>
      <button class="ghost" data-act="close">Leave</button>`;
  }
  if(poi.type==='diner'){
    return `<h2>🍔 Diner</h2>
      <button data-act="food">+55 Food ($${PR.dinerFood})</button>
      <button data-act="water">+45 Water ($${PR.dinerWater})</button>
      <button class="ghost" data-act="close">Leave</button>`;
  }
  if(poi.type==='bar'){
    return `<h2>🍺 Bar</h2>
      <button data-act="water">+50 Water ($${PR.barWater})</button>
      <button data-act="food">+30 Food ($${PR.barFood})</button>
      <button class="ghost" data-act="close">Leave</button>`;
  }
  return '';
}
function openShop(poi){
  state.shopPOI = poi; state.paused = true;
  shopEl.innerHTML = `<div class="card">${shopHTML(poi)}</div>`;
  shopEl.classList.remove('hidden');
}
function refreshShop(){ shopEl.innerHTML = `<div class="card">${shopHTML(state.shopPOI)}</div>`; updateHUD(); }
function closeShop(){ state.paused=false; state.shopPOI=null; shopEl.classList.add('hidden'); }

function shopAction(act){
  const s = state, p = s.shopPOI; if(!p) return;
  const t = p.type;
  if(act==='close'){ closeShop(); return; }
  if(act==='sell'){ sellCars(); refreshShop(); return; }
  if(act.startsWith('up-')){ buyUpgrade(act.slice(3)); refreshShop(); return; }
  let amt, price, res;
  if(act==='gas'){ amt=45; price=PR.gas; res='gas'; }
  else if(act==='food'){
    if(t==='gas'){ amt=55; price=PR.panicFood; } else if(t==='bar'){ amt=30; price=PR.barFood; } else { amt=55; price=PR.dinerFood; }
    res='food';
  } else if(act==='water'){
    if(t==='gas'){ amt=50; price=PR.panicWater; } else if(t==='bar'){ amt=50; price=PR.barWater; } else { amt=45; price=PR.dinerWater; }
    res='water';
  }
  if(s.money >= price){
    s.money -= price;
    s[res] = Math.min(getMax(res), s[res] + amt);
    showMsg(`+${amt} ${res}`, '#7CFC00'); blip(660, 0.08);
  } else { showMsg('Not enough $', '#ff5555'); }
  updateHUD();
}

function buyUpgrade(key){
  const s = state;
  if(key==='gas' && s.gasStage<3){ const c=gasCost[s.gasStage]; if(s.money>=c){ s.money-=c; s.gasStage++; s.gas=Math.min(getMax('gas'), s.gas+80); showMsg('Gas Tank Up!','#7CFC00'); blip(720,0.1); } }
  else if(key==='turbo' && s.turboStage<3){ const c=turboCost[s.turboStage]; if(s.money>=c){ s.money-=c; s.turboStage++; showMsg('Turbo Up!','#7CFC00'); blip(760,0.1); } }
  else if(key==='armor' && s.armorStage<3){ const c=armorCost[s.armorStage]; if(s.money>=c){ s.money-=c; s.armorStage++; showMsg('Armor Up!','#7CFC00'); blip(700,0.1); } }
  else if(key==='freezer' && !s.freezer){ if(s.money>=freezerCost){ s.money-=freezerCost; s.freezer=true; showMsg('Mini Freezer!','#7CFC00'); blip(820,0.12); } }
  else { showMsg('Already maxed','#ffec8b'); }
}

function sellCars(){
  let sum=0;
  for(const c of state.attached){ sum += c.userData.cfg.value; scene.remove(c); }
  state.repoCount += state.attached.length;
  state.totalEarned += sum;
  state.money += sum;
  state.attached = [];
  showMsg(`Sold cars! +$${sum}`, '#FFD700');
  blip(880,0.12); setTimeout(()=>blip(1180,0.12),90);
}

/* ============================== HUD ============================== */
const foodFill=document.getElementById('foodFill'), waterFill=document.getElementById('waterFill'), gasFill=document.getElementById('gasFill'), statsEl=document.getElementById('stats');
function nearestPOI(type){
  let best=null, bd=1e9;
  for(const p of state.pois){
    if(p.type!==type) continue;
    const d=Math.hypot(p.x-truck.position.x, p.z-truck.position.z);
    if(d<bd){ bd=d; best=p; }
  }
  return best ? {poi:best, dist:bd} : null;
}
function compassArrow(dx,dz){
  const f = forwardVec(state.heading);
  const fl = Math.hypot(f.x,f.z) || 1; const fx=f.x/fl, fz=f.z/fl;
  const tl = Math.hypot(dx,dz) || 1; const tx=dx/tl, tz=dz/tl;
  const fwdDot = tx*fx + tz*fz;
  const rDot = tx*(-fz) + tz*(fx);
  const ang = Math.atan2(rDot, fwdDot);
  const arrows=['↑','↗','→','↘','↓','↙','←','↖'];
  let i = Math.round(ang/(Math.PI/4));
  i = ((i%8)+8)%8;
  return arrows[i];
}
function updateHUD(){
  const s = state;
  foodFill.style.width  = Math.max(0, s.food /getMax('food') *100) + '%';
  waterFill.style.width = Math.max(0, s.water/getMax('water')*100) + '%';
  gasFill.style.width   = Math.max(0, s.gas  /getMax('gas')  *100) + '%';
  const upg = `T${s.turboStage} · G${s.gasStage} · A${s.armorStage} · F${s.freezer?'✓':'✗'}`;
  const g = nearestPOI('garage');
  const gs = nearestPOI('gas');
  const gArrow  = g  ? `🔧 ${Math.round(g.dist)}m ${compassArrow(g.poi.x-truck.position.x, g.poi.z-truck.position.z)}` : '🔧 —';
  const gsArrow = gs ? `⛽ ${Math.round(gs.dist)}m ${compassArrow(gs.poi.x-truck.position.x, gs.poi.z-truck.position.z)}` : '⛽ —';
  statsEl.innerHTML =
    `<div style="text-align:left;margin-bottom:4px;line-height:1.4"><span style="color:#55ccff">${gArrow}</span><br><span style="color:#ff7a55">${gsArrow}</span></div>` +
    `<b>$${s.money}</b><br>SPD ${Math.round(Math.abs(s.speed))}<br>Towed ${s.attached.length}/${ATTACH_MAX}<br>Dist ${Math.round(s.dist)}m<br><span style="font-size:11px;color:#9fb0c3">${upg}</span>`;
}

const messagesEl = document.getElementById('messages');
function showMsg(t, color){
  const el = document.createElement('div'); el.className='msg'; el.style.color=color||'#fff'; el.textContent=t;
  messagesEl.appendChild(el); setTimeout(()=>el.remove(), 1400);
}

/* ============================== AUDIO ============================== */
let actx, engineOsc, engineGain, engineFilter;
function initAudio(){
  try{
    actx = new (window.AudioContext||window.webkitAudioContext)();
    engineOsc = actx.createOscillator(); engineOsc.type='sawtooth';
    engineFilter = actx.createBiquadFilter(); engineFilter.type='lowpass';
    engineGain = actx.createGain(); engineGain.gain.value=0;
    engineOsc.connect(engineFilter); engineFilter.connect(engineGain); engineGain.connect(actx.destination);
    engineOsc.frequency.value=55; engineOsc.start();
  }catch(e){ actx=null; }
}
function updateEngine(speed, maxS, on){
  if(!actx) return;
  const t = Math.min(1, Math.abs(speed)/maxS);
  engineOsc.frequency.value = 50 + t*130;
  engineFilter.frequency.value = 200 + t*1300;
  const target = (on && !state.paused && !state.muted) ? 0.04 + t*0.05 : 0;
  engineGain.gain.value += (target - engineGain.gain.value)*0.2;
}
function blip(freq, dur, delay){
  if(!actx || state.muted) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.frequency.value = freq; o.type='square';
  g.gain.value = 0.08; o.connect(g); g.connect(actx.destination);
  const start = actx.currentTime + (delay||0);
  o.start(start); g.gain.setValueAtTime(0.08, start);
  g.gain.exponentialRampToValueAtTime(0.0001, start+dur); o.stop(start+dur+0.02);
}
function crashSound(){
  if(!actx || state.muted) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(180, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(40, actx.currentTime+0.25);
  g.gain.value=0.12; o.connect(g); g.connect(actx.destination);
  o.start(); g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+0.3); o.stop(actx.currentTime+0.32);
}
function toggleMute(){ state.muted = !state.muted; showMsg(state.muted?'Muted':'Sound on', '#7fd3ff'); }

/* ============================== FLOW ============================== */
const truck = makeTruck();
scene.add(truck);

function resetGame(){
  state.traffic.forEach(c=>scene.remove(c));
  state.attached.forEach(c=>scene.remove(c));
  state.pois.forEach(p=>scene.remove(p.group));
  state.traffic=[]; state.attached=[]; state.pois=[];
  state.heading=0; state.speed=0; state.pos.set(0,0,0);
  state.food=85; state.water=85; state.gas=100; state.money=60;
  state.gasStage=0; state.turboStage=0; state.armorStage=0; state.freezer=false;
  state.repoCount=0; state.totalEarned=0; state.dist=0;
  state.nextPOIZ=-300; state.frontierZ=0;
  truck.position.set(0,0,0); truck.rotation.y=0;
  let pidx = 0;
  while(state.nextPOIZ > state.pos.z - 1600){
    const forced = (pidx === 1) ? 'garage' : null;  // guarantee an early garage
    spawnPOI(state.nextPOIZ, forced);
    state.nextPOIZ -= rand(250,460); pidx++;
  }
  while(state.frontierZ > state.pos.z - 850 && state.traffic.length < TARGET_TRAFFIC){ state.frontierZ -= rand(70,170); spawnCar(state.frontierZ); }
  state.mode='playing'; state.paused=false;
  shopEl.classList.add('hidden'); document.getElementById('gameover').classList.add('hidden');
  updateHUD();
}

function gameOver(){
  if(state.mode==='over') return;
  state.mode='over';
  let reason='You ran out of something important.';
  if(state.gas<=0) reason='Out of gas. Stranded. WTF Daniel.';
  else if(state.food<=0) reason='Starved. Should have stopped at a diner. WTF Daniel.';
  else if(state.water<=0) reason='Dehydrated. The bar was right there. WTF Daniel.';
  document.getElementById('goReason').textContent = reason;
  document.getElementById('goStats').innerHTML =
    `<div><b>${state.repoCount}</b><span>Cars Repo'd</span></div>
     <div><b>$${state.totalEarned}</b><span>Earned</span></div>
     <div><b>${Math.round(state.dist)}m</b><span>Distance</span></div>
     <div><b>$${state.money}</b><span>Cash Left</span></div>`;
  document.getElementById('gameover').classList.remove('hidden');
}

/* ============================== INPUT ============================== */
const keys = {};
addEventListener('keydown', e=>{
  keys[e.code] = true;
  if(state.mode==='intro'){
    if(e.code==='Enter' || e.code==='Space'){
      if(storyIdx < storyLines.length-1) advanceStory(); else startGame();
    }
    return;
  }
  if(e.code==='KeyE' && !e.repeat) interact();
  if(e.code==='Escape') closeShop();
  if(e.code==='KeyM' && !e.repeat) toggleMute();
});
addEventListener('keyup', e=>{ keys[e.code]=false; });

function interact(){
  if(state.mode!=='playing' || state.paused) return;
  const n = state.near; if(!n) return;
  if(n.type==='wreck'){ if(state.attached.length<ATTACH_MAX) attachCar(n.car); }
  else if(n.type==='poi'){ openShop(n.poi); }
}

shopEl.addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  shopAction(b.dataset.act);
});

/* ============================== INTRO ============================== */
const storyLines = [
  "Daniel wakes up. Head pounding. 3am? Noon? Who cares.",
  "The dog is still asleep, dead to the world. Lucky bastard.",
  "Repo shift starts now. Keys. Where the hell are the keys?",
  "Found 'em. The yellow truck's outside, engine ticking.",
  "Time to catch some cars. Ram 'em, total 'em, tow 'em.",
];
let storyIdx = 0;
const storyEl = document.getElementById('story');
const startBtn = document.getElementById('startBtn');
function renderStory(){
  storyEl.innerHTML = storyLines.slice(0, storyIdx+1).map((l,i)=>`<p class="${i===storyIdx?'cur':''}">${l}</p>`).join('')
    + (storyIdx < storyLines.length-1 ? '<p class="hint">click / press Enter ▸</p>' : '');
  startBtn.style.display = storyIdx >= storyLines.length-1 ? 'block' : 'none';
}
function advanceStory(){ if(storyIdx < storyLines.length-1){ storyIdx++; renderStory(); } }
document.getElementById('intro').addEventListener('click', e=>{
  if(e.target.id==='startBtn'){ startGame(); return; }
  if(state.mode==='intro') advanceStory();
});
startBtn.addEventListener('click', e=>{ e.stopPropagation(); startGame(); });
document.getElementById('againBtn').addEventListener('click', ()=> startGame());

function startGame(){
  document.getElementById('intro').style.display='none';
  if(!actx) initAudio();
  resetGame();
}

/* ============================== LOOP ============================== */
const clock = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(0.05, clock.getDelta());
  if(state.mode==='playing' && !state.paused){
    updateControls(dt);
    updateTruck(dt);
    updateTraffic(dt);
    updateAttached(dt);
    checkCollisions();
    updateResources(dt);
    maintainWorld();
    state.dist = Math.max(state.dist, -state.pos.z);
    updateNear();
    updateHUD();
  }
  updateCamera(dt);
  updateEngine(state.speed, maxSpeedNow(), state.mode==='playing');
  renderer.render(scene, camera);
}

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* Boot */
resetGame();
state.mode='intro';
renderStory();
animate();
</script>
